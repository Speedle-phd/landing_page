name: Build and Deploy

on:
   push:
      branches:
         - main

jobs:
   build-and-deploy:
      runs-on: ubuntu-latest
      steps:
         - name: Archive app
           run: |
               tar -czf app.tar.gz

         - name: Remove /var/www/html contents
           uses: appleboy/ssh-action@v1.0.3
           with:
              host: ${{ secrets.SSH_HOST }}
              username: ${{ secrets.SSH_USERNAME }}
              key: ${{ secrets.SSH_PRIVATE_KEY }}
              script: |
                  cd /var/www/html
                  rm -rf /var/www/html/*
                  
         - name: Copy to server
           uses: appleboy/scp-action@v0.1.7
           with:
              host: ${{ secrets.SSH_HOST }}
              username: ${{ secrets.SSH_USERNAME }}
              key: ${{ secrets.SSH_PRIVATE_KEY }}
              source: "app.tar.gz"
              target: "/var/www/html"
      
